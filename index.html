<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us on Viber</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #665CAC, #8f7cf0);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 500px;
            padding: 20px;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        p {
            font-size: 1.2em;
            margin-bottom: 30px;
        }

        .viber-button {
            display: inline-block;
            padding: 15px 30px;
            font-size: 1.2em;
            color: #fff;
            background-color: #7360f2;
            border: none;
            border-radius: 50px;
            text-decoration: none;
            transition: background 0.3s ease, transform 0.2s ease;
        }

        .viber-button:hover {
            background-color: #5a48d6;
            transform: scale(1.05);
        }

        footer {
            margin-top: 40px;
            font-size: 0.9em;
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Contact Us</h1>
        <p>Have questions or need help? Chat with us directly on Viber.</p>

        <a href="viber://chat?number=959777001840" class="viber-button">
            Chat on Viber
        </a>

        <footer>
            Available 24/7 • Fast response
        </footer>
    </div>

</body>
</html>
